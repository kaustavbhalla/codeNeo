name: contest_tracker
description: "CodeNeo: Track competitive programming contests across LeetCode, Codeforces & CodeChef with Nothing OS-inspired design"
publish_to: 'none'
version: 2.0.4+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  # State Management
  provider: ^6.1.2
  # HTTP & API
  http: ^1.2.1
  # Local Storage
  shared_preferences: ^2.3.3
  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  # Charts
  fl_chart: ^0.69.2
  # Fonts
  google_fonts: ^6.2.1
  # Date/Time
  intl: ^0.19.0
  # URL launcher
  url_launcher: ^6.3.1
  # Permissions
  permission_handler: ^11.3.1
  # Cached network image
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "logos/app/appLogo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/logos/
